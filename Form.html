<html>
<head>
<title>Form</title>
</head>
<body>
<form id="myForm">
  <input type="text" id="name">
  <button type="submit">Submit</button>
</form>

<script>
const form = document.getElementById("myForm");

form.addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent page reload
    alert("Form submitted!");
});
</script>
</body>
</html>
