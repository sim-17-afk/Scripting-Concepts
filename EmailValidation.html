
<html>
<body>

<h3>Email Validation</h3>

<input type="text" id="email">
<button onclick="checkEmail()">Submit</button>

<p id="msg" style="color:red;"></p>

<script>
function checkEmail() {
    var email = document.getElementById("email").value;

    if (email == "") {
        document.getElementById("msg").innerHTML = "Email cannot be empty";
    }
    else if (!email.includes("@") || !email.includes(".")) {
        document.getElementById("msg").innerHTML = "Invalid email format";
    }
    else {
        document.getElementById("msg").innerHTML = "Valid email";
    }
}
</script>

</body>
</html>
